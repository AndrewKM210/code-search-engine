# Model Configuration
model_name: "all-MiniLM-L6-v2"                  # Name of HuggingFace base sentence transformer model
finetuned_model_path: "finetuned_model"         # Path to save/load finetuned base model
device: "auto"                                  # Compute device for embeddings: auto | cuda | mps | cpu

# Vector DB (Qdrant)
qdrant:
  storage_path: "./qdrant_storage"              # Path where Qdrant vector database is stored
  self_repo_collection: "self_repo"             # Name of Qdrant collection for this repo's own source
  full_collection: "cosqa_full"                 # Name of Qdrant collection for the complete CoSQA dataset
  eval_base_collection: "cosqa_base"            # Name of Qdrant collection for the CoSQA evaluation split
  eval_finetuned_collection: "cosqa_finetuned"  # Name of Qdrant collection for the CoSQA train split

# Data Processing for Indexing
splitter:
  chunk_size: 1000
  chunk_overlap: 100

# Fine-tuning
training:
  batch_size: 16
  num_epochs: 1
  max_train_steps: -1