# LLM Configuration
default_model: "phi3"

# Per-model capabilities, looked up by exact Ollama model name
# Models not listed here default to native_tool_calling: false (the JSON fallback path)
models:
  "llama3.2:3b":
    native_tool_calling: true
  "qwen2.5-coder:3b":
    native_tool_calling: false
  "phi3":
    native_tool_calling: false