name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10.18"
          cache: "pip"

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10.18"
          cache: "pip"

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Check formatting
        run: make format-check

      - name: Lint
        run: make lint

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10.18"
          cache: "pip"

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Type check
        run: make type
